name: Link Check

on:
  push:
    branches: ["**"]
    paths: ["**/*.md"]
  pull_request:
    paths: ["**/*.md"]
  schedule:
    # Run weekly to catch externally broken links
    - cron: "0 6 * * 1"

jobs:
  link-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          # GITHUB_TOKEN allows lychee to authenticate private GitHub repos
          # without it, private repos return 404 and fail the check
          token: ${{ secrets.GITHUB_TOKEN }}
          args: --verbose --no-progress --exclude-loopback --github-token ${{ secrets.GITHUB_TOKEN }} "**/*.md"
          fail: true
