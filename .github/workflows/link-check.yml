name: Link Check

on:
  push:
    branches: ["**"]
    paths: ["**/*.md"]
  pull_request:
    paths: ["**/*.md"]
  schedule:
    # Run weekly to catch externally broken links
    - cron: "0 6 * * 1"

jobs:
  link-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress --exclude-loopback "**/*.md"
          fail: true
