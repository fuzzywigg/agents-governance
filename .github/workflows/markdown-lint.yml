name: Markdown Lint

on:
  push:
    branches: ["**"]
    paths: ["**/*.md"]
  pull_request:
    paths: ["**/*.md"]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"
          config: ".markdownlint.json"
