name: Markdown Lint

on:
  push:
    branches: ["**"]
    paths: ["**/*.md"]
  pull_request:
    paths: ["**/*.md"]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !.github/agents/**
          config: ".markdownlint.json"
